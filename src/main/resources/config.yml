# ┌────────────────────────────────────────────────────────────────────────────────────────┐
# │  ✨ JoehesLPC – The Ultimate, Ultra-Optimized LuckPerms Chat Formatter ✨              │
# │                                                                                        │
# │  Designed for hyper-performance, zero style leaks, and native MiniMessage parsing.    │
# │  Wiki & Docs: https://github.com/Sxnpaiwin/joehes-luck-perms-chat                     │
# └────────────────────────────────────────────────────────────────────────────────────────┘

# 💡 QUICK START: SETTING UP LUCKPERMS
# To set up prefixes and suffixes in LuckPerms, use the following commands:
#   - Group Prefix:   /lp group <group> meta setprefix "<red>[Admin] "
#   - Group Suffix:   /lp group <group> meta setsuffix "<gray>[VIP]"
#   - User Prefix:    /lp user <player> meta setprefix "<blue>[Builder] "
#
# ℹ️ IMPORTANCE OF MINIMESSAGE TAGS:
# Any prefix, suffix, and metadata must use native MiniMessage tag strings instead of legacy
# color symbols like '&a' or '§b' for optimal performance and native Minecraft UI rendering.
# (e.g., use "<red>[Prefix]</red>" instead of "&c[Prefix]").
#
# 📦 CHAT PLACEHOLDERS:
# You can use the following dynamic placeholders in your chat formats:
#   - {message}          » The player's safe chat message (injected safely, secure from exploits).
#   - {name}             » The player's standard Minecraft username.
#   - {displayname}      » The player's active nickname / display name.
#   - {prefix}           » The player's highest priority LuckPerms prefix.
#   - {suffix}           » The player's highest priority LuckPerms suffix.
#   - {prefixes}         » A space-separated list of all prefixes active on the player (sorted).
#   - {suffixes}         » A space-separated list of all suffixes active on the player (sorted).
#   - {world}            » The name of the player's current Minecraft world.
#   - {gradient-name}    » The player's username styled with their rank's custom gradient.
#   - {username-color}   » The custom 'username-color' metadata value set in LuckPerms.
#   - {message-color}    » The custom 'message-color' metadata value set in LuckPerms.
#
# 🔌 PLACEHOLDERAPI SUPPORT:
# Any PlaceholderAPI variables (like %player_ping%, %server_ram%, etc.) are fully supported and
# resolved dynamically inside your chat formats when the PlaceholderAPI plugin is active!

# ─────────────────────────────────────────────────────────────────────────────────────────
#  💬 Main Chat Layout
# ─────────────────────────────────────────────────────────────────────────────────────────

# The default formatting template applied to player chat messages.
# Uses MiniMessage tags (e.g., <dark_gray>, <reset>).
chat-format: "{prefix}{name}{suffix}<dark_gray> »<reset> {message}"

# Per-Group Formatting (Optional)
# If enabled, members of the specified LuckPerms group will use this custom template.
# Simply remove the '#' character to activate a custom group format.
group-formats:
#  default: "<gray>[User]</gray> {name}<dark_gray> »<reset> {message}"
#  admin: "<red>[Admin]</red> {name}<dark_gray> »<reset> {message}"

# Per-Track Formatting (Optional)
# Group formats always take priority over Track formats.
track-formats:
#  staff_track: "<gold>[Staff]</gold> {name}<dark_gray> »<reset> {message}"

# ─────────────────────────────────────────────────────────────────────────────────────────
#  ⚙️ General Settings
# ─────────────────────────────────────────────────────────────────────────────────────────

# Enable the special '[item]' placeholder.
# When a player types [item] in chat, it will display the item currently held in their main hand
# as a neat clickable token with a detailed item details tooltip (hover support on Paper).
# Requires the 'joeheslpc.itemplaceholder' permission to use.
use-item-placeholder: true

# Allow cosmetic formatting tags for players with the 'joeheslpc.chatcolor' permission.
# When true, authorized players can use tags like <gradient>, <rainbow>, and basic color codes
# (or legacy '&' colors) in their chat messages. Interactive tags (click/hover) are ALWAYS
# stripped from player inputs to prevent server security exploits.
allow-gradient-tags: true

# Worlds where JoehesLPC should completely bypass and NOT format chat.
# Useful if you want other chat plugins or vanilla formatting to handle specific worlds.
# Example: disabled-worlds: [ "creative", "lobbies" ]
disabled-worlds: []

# Check Modrinth for new versions on startup and notify administrators with the 'joeheslpc.update'
# permission when logging into the server.
update-checker: true

# The confirmation message printed after executing '/jlpc reload'.
reload-message: "<green>Reloaded JoehesLPC configuration!"

# ─────────────────────────────────────────────────────────────────────────────────────────
#  🔊 @Mention Pings
# ─────────────────────────────────────────────────────────────────────────────────────────
# Automatically highlight mentioned player names in chat, and ping them with action bar alerts
# and customized pickup sounds!
mentions:
  # Enable or disable the mention engine completely.
  enabled: true
  # Require players to prefix a name with '@' to count as a mention (e.g. '@Sxnpaiwin').
  require-at-symbol: false
  # How the highlighted username is rendered in chat for the viewers.
  highlight-format: "<gold>@<name></gold>"
  # Safety cap: maximum number of individual players that can be mentioned in a single message.
  max-mentions-per-message: 5
  # The action-bar alert text shown to the mentioned player (Paper only).
  actionbar-text: "<gold>You were mentioned by <white><sender></white>"
  # The sound played to the mentioned player. Must be a valid Minecraft sound key.
  # (e.g., 'entity.experience_orb.pickup', 'block.note_block.bell', 'entity.player.levelup').
  ping-sound: "entity.experience_orb.pickup"
  # Volume (0.0 to 1.0) and Pitch (0.5 to 2.0) of the ping sound.
  ping-volume: 1.0
  ping-pitch: 1.0

# ─────────────────────────────────────────────────────────────────────────
#  😀 Emoji Replacements
# ─────────────────────────────────────────────────────────────────────────
# Replace standard text-shortcuts with expressive unicode glyphs in real-time.
emoji:
  # Enable or disable emoji shortcuts completely.
  enabled: true
  # When true, only players with the 'joeheslpc.emoji' permission can use emoji shortcuts.
  # When false, everyone on the server can use them!
  require-permission: false
  # Fully customizable key-value shortcut map.
  replacements:
    ":heart:": "❤"
    ":star:": "★"
    ":check:": "✔"
    ":cross:": "✖"
    ":arrow:": "➜"
    ":note:": "♪"

# ─────────────────────────────────────────────────────────────────────────
#  🔗 URL Linkification
# ─────────────────────────────────────────────────────────────────────────
# Automatically turns web links in chat into clickable, styled hyperlinks.
# Requires the 'joeheslpc.chatlinks' permission to use.
link-urls:
  # Turn on web links in chat.
  enabled: true
  # The MiniMessage styling applied to the link (clickable on Paper, colored on Spigot).
  style: "<blue><underlined>"
  # The hover tooltip displayed when hovering over the web link (Paper only).
  hover-text: "<gray>Open link"
  # Allowed URL protocol schemes.
  allowed-schemes:
    - http
    - https
  # Safety cap: maximum character length of the link before it is truncated.
  max-length: 200

# ─────────────────────────────────────────────────────────────────────────
#  👑 Per-Rank Message Styles
# ─────────────────────────────────────────────────────────────────────────
# Automatically style and color the player's OWN words based on their LuckPerms rank,
# WITHOUT giving them MiniMessage formatting permissions!
message-styles:
  enabled: false
group-message-styles:
#  admin: "<red>{message}</red>"
#  donator: "<light_purple>{message}</light_purple>"
track-message-styles:
#  staff_track: "<aqua>{message}</aqua>"
# The fallback style applied if no group or track styles are matched (empty for normal).
default-message-style: ""

# ─────────────────────────────────────────────────────────────────────────
#  🎨 Gradient Names
# ─────────────────────────────────────────────────────────────────────────
# Style the player's {gradient-name} placeholder with a per-rank custom gradient.
# The gradient specification is retrieved from their LuckPerms metadata node (e.g. '#B754F4:#FC00FF')
# or falls back to the group-name-gradients list below.
gradient-names:
  enabled: false
  default-meta-key: "username-gradient"
group-name-gradients:
#  admin: "#FF5555:#FFAA00"
#  donator: "#B754F4:#FC00FF"

# ─────────────────────────────────────────────────────────────────────────
#  👋 Server Connection & Death Messages
# ─────────────────────────────────────────────────────────────────────────
# Customize server-wide join, quit, and death alerts using MiniMessage.
# Keep the format empty (e.g. "") to completely suppress that specific message.
join-messages:
  enabled: false
  format: "<dark_gray>[<green>+</green>] {prefix}{name}"
  first-join:
    enabled: false
    format: "<gradient:#B754F4:#FC00FF>Welcome {name} to the server!</gradient>"
quit-messages:
  enabled: false
  format: "<dark_gray>[<red>-</red>] {prefix}{name}"
death-messages:
  enabled: false
  # <death-message> placeholder is replaced with the vanilla death cause.
  format: "<gray>☠ <death-message>"
  show-vanilla-cause: true

# 🚨 INTERNAL CONFIG VERSION - DO NOT TOUCH!
config-version: 3
