name: JoehesLPC
version: '${version}'
main: de.joehe.lpc.JoehesLPC
api-version: '1.21'
folia-supported: true
authors: [Sxnpaiwin, Joehe, "modrinth.com/user/Sxnpaiwin"]
depend: [LuckPerms]
softdepend: [PlaceholderAPI]
description: Flexible MiniMessage chat formatter for LuckPerms (Minecraft 1.21+ / Java 25)
website: https://github.com/Sxnpaiwin/joehes-luck-perms-chat
commands:
  jlpc:
    description: JoehesLPC chat formatter commands.
    usage: "Usage: /jlpc <reload|version|help>"
    aliases: [lpc, joeheslpc]
permissions:
  lpc.reload:
    description: Allows reloading the JoehesLPC configuration.
    default: op
  lpc.chatcolor:
    description: Allows using colour codes and cosmetic MiniMessage tags in chat.
    default: false
  lpc.itemplaceholder:
    description: Allows using the [item] placeholder in chat.
    default: false
  lpc.update:
    description: Receive an update notification on join when a new version is available.
    default: op
  lpc.emoji:
    description: Use emoji shortcuts in chat (only enforced when emoji.require-permission is true).
    default: true
  lpc.chatlinks:
    description: Have URLs in your messages turned into clickable links.
    default: true
  lpc.mention.exempt:
    description: Opt out of receiving mention pings.
    default: false
  lpc.mute:
    description: Use /lpc mute and /lpc unmute.
    default: op
  lpc.muted:
    description: Marks a player as muted (usually granted by a punishment plugin).
    default: false
  lpc.bypass.spam:
    description: Bypass the anti-spam cooldown.
    default: op
  lpc.bypass.repeat:
    description: Bypass the repeated-message filter.
    default: op
  lpc.bypass.caps:
    description: Bypass the caps filter.
    default: op
  lpc.bypass.profanity:
    description: Bypass the profanity filter.
    default: op
  lpc.bypass.advert:
    description: Bypass the anti-advertising filter.
    default: op