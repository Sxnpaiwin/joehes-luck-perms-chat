name: Dev Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "Github Actions"

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Set version
        run: |
          BASE_VERSION=$(grep '^project_version' gradle.properties | cut -d' ' -f3)
          FULL_VERSION="${BASE_VERSION}-dev-${COMMIT_HASH}"
          echo "Setting version to $FULL_VERSION"
          sed -i "s/^project_version = .*/project_version = ${FULL_VERSION}/" gradle.properties

      - name: Build Jar
        run: |
          ./gradlew clean
          ./gradlew shadowJar --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoehesLPC-dev-${{ steps.commit.outputs.hash }}
          path: build/libs/*.jar
          retention-days: 7

      - name: Update Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: "JoehesLPC Latest Dev Build (main)"
          body: "This release is automatically updated on every push to the `main` branch. Active commit: ${{ steps.commit.outputs.hash }}"
          prerelease: true
          files: build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
